<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buenos Aires by Night — El Archivo</title>

  <!-- Tipografía gótica -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root { --sangre: #7a0c12; --oro: #b8954b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    #loader {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #d9c7a3;
      font-family: "Cinzel", serif; letter-spacing: 0.15em;
      transition: opacity 1.2s ease;
    }
    #loader .titulo { font-size: clamp(1.2rem, 4vw, 2rem); opacity: 0.9; }
    #loader .sub {
      margin-top: 1rem; font-family: "EB Garamond", serif;
      font-style: italic; font-size: 0.95rem; letter-spacing: 0.05em;
      color: #6e5e3e;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    /* parpadeo sutil del texto de carga */
    @keyframes velo { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
    #loader .titulo { animation: velo 3s ease-in-out infinite; }

    #info-hint {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
      z-index: 9; color: #6e5e3e; font-family: "EB Garamond", serif;
      font-size: 0.85rem; letter-spacing: 0.04em; text-align: center;
      opacity: 0.7; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="titulo">El Archivo se abre…</div>
    <div class="sub">Buenos Aires by Night</div>
  </div>

  <div id="info-hint">
    Arrastrá para mirar · WASD para moverte · ponete el visor y entrá · puño = garras · botón ✗ = modo passthrough
  </div>

  <!-- Three.js vía importmap (sin build) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
